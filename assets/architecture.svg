<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 520" fill="none" role="img" aria-label="Architettura Sentinel BOX">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1120" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05070f"/>
      <stop offset="1" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#5b6bff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#22d3ee"/>
    </marker>
  </defs>

  <rect width="1120" height="520" rx="20" fill="url(#bg)"/>
  <rect x="1" y="1" width="1118" height="518" rx="19" stroke="rgba(120,150,210,0.22)" stroke-width="1"/>

  <!-- grid decor -->
  <g opacity="0.08" stroke="#7896d2" stroke-width="0.5">
    <path d="M0 130 H1120 M0 260 H1120 M0 390 H1120"/>
    <path d="M160 0 V520 M400 0 V520 M720 0 V520 M960 0 V520"/>
  </g>

  <text x="560" y="42" text-anchor="middle" fill="#e9eefb" font-family="Segoe UI, system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="2">ARCHITETTURA SENTINEL BOX</text>
  <text x="560" y="68" text-anchor="middle" fill="#8595b4" font-family="Segoe UI, system-ui, sans-serif" font-size="13">Dal veicolo al referto  edge computing in officina</text>

  <!-- Veicolo -->
  <g transform="translate(48, 120)">
    <rect width="200" height="280" rx="16" fill="rgba(18,24,41,0.85)" stroke="rgba(120,150,210,0.28)" stroke-width="1.5"/>
    <text x="100" y="36" text-anchor="middle" fill="#8595b4" font-family="Segoe UI, sans-serif" font-size="11" letter-spacing="1.2">VEICOLO</text>
    <rect x="50" y="58" width="100" height="64" rx="12" fill="rgba(34,211,238,0.08)" stroke="url(#cyan)" stroke-width="1.2"/>
    <text x="100" y="88" text-anchor="middle" fill="#22d3ee" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600">OBD-II / UDS</text>
    <text x="100" y="108" text-anchor="middle" fill="#8595b4" font-family="Segoe UI, sans-serif" font-size="11">Centraline ECU</text>
    <rect x="40" y="148" width="120" height="44" rx="10" fill="rgba(124,92,255,0.1)" stroke="rgba(124,92,255,0.45)" stroke-width="1"/>
    <text x="100" y="175" text-anchor="middle" fill="#c4b5fd" font-family="Segoe UI, sans-serif" font-size="12">Adattatore ELM327</text>
    <text x="100" y="230" text-anchor="middle" fill="#e9eefb" font-family="Segoe UI, sans-serif" font-size="12">DTC À PID À VIN</text>
    <text x="100" y="252" text-anchor="middle" fill="#8595b4" font-family="Segoe UI, sans-serif" font-size="11">Lettura live seriale</text>
  </g>

  <!-- Pi -->
  <g transform="translate(872, 120)">
    <rect width="200" height="280" rx="16" fill="rgba(18,24,41,0.85)" stroke="rgba(120,150,210,0.28)" stroke-width="1.5"/>
    <text x="100" y="36" text-anchor="middle" fill="#8595b4" font-family="Segoe UI, sans-serif" font-size="11" letter-spacing="1.2">BANCO OFFICINA</text>
    <rect x="36" y="58" width="128" height="72" rx="12" fill="rgba(34,211,238,0.08)" stroke="url(#cyan)" stroke-width="1.2" filter="url(#glow)"/>
    <text x="100" y="88" text-anchor="middle" fill="#22d3ee" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600">Raspberry Pi 5</text>
    <text x="100" y="108" text-anchor="middle" fill="#8595b4" font-family="Segoe UI, sans-serif" font-size="11">Touch 720Î1280</text>
    <rect x="40" y="148" width="120" height="44" rx="10" fill="rgba(34,211,238,0.06)" stroke="rgba(34,211,238,0.35)" stroke-width="1"/>
    <text x="100" y="168" text-anchor="middle" fill="#e9eefb" font-family="Segoe UI, sans-serif" font-size="12">Kiosk UI</text>
    <text x="100" y="184" text-anchor="middle" fill="#8595b4" font-family="Segoe UI, sans-serif" font-size="10">Next.js À React</text>
    <text x="100" y="230" text-anchor="middle" fill="#e9eefb" font-family="Segoe UI, sans-serif" font-size="12">Stampa referto PDF</text>
    <text x="100" y="252" text-anchor="middle" fill="#8595b4" font-family="Segoe UI, sans-serif" font-size="11">QR passaporto veicolo</text>
  </g>

  <!-- Sentinel stack -->
  <g transform="translate(300, 100)">
    <rect width="520" height="320" rx="18" fill="rgba(13,19,34,0.92)" stroke="rgba(34,211,238,0.35)" stroke-width="1.5"/>
    <text x="260" y="32" text-anchor="middle" fill="#22d3ee" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">SENTINEL BOX  STACK SOFTWARE</text>

    <rect x="36" y="52" width="448" height="48" rx="10" fill="rgba(34,211,238,0.07)" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
    <text x="56" y="80" fill="#22d3ee" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600">Frontend</text>
    <text x="150" y="80" fill="#8595b4" font-family="Segoe UI, sans-serif" font-size="12">Dashboard À Catalogo guasti À Guida intervento</text>

    <rect x="36" y="112" width="448" height="48" rx="10" fill="rgba(124,92,255,0.08)" stroke="rgba(124,92,255,0.35)" stroke-width="1"/>
    <text x="56" y="140" fill="#c4b5fd" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600">API Layer</text>
    <text x="150" y="140" fill="#8595b4" font-family="Segoe UI, sans-serif" font-size="12">FastAPI À REST À WebSocket À Auth JWT</text>

    <rect x="36" y="172" width="210" height="48" rx="10" fill="rgba(61,220,151,0.07)" stroke="rgba(61,220,151,0.35)" stroke-width="1"/>
    <text x="56" y="200" fill="#3ddc97" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600">ML Engine</text>
    <text x="56" y="214" fill="#8595b4" font-family="Segoe UI, sans-serif" font-size="10">Batteria À tagliando À anomalie</text>

    <rect x="274" y="172" width="210" height="48" rx="10" fill="rgba(255,181,84,0.07)" stroke="rgba(255,181,84,0.35)" stroke-width="1"/>
    <text x="294" y="200" fill="#ffb454" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600">Data Layer</text>
    <text x="294" y="214" fill="#8595b4" font-family="Segoe UI, sans-serif" font-size="10">PostgreSQL À Redis À catalogo DTC</text>

    <rect x="36" y="232" width="448" height="56" rx="10" fill="rgba(255,93,115,0.06)" stroke="rgba(255,93,115,0.35)" stroke-width="1"/>
    <text x="56" y="260" fill="#ff5d73" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600">Core OBD</text>
    <text x="150" y="260" fill="#8595b4" font-family="Segoe UI, sans-serif" font-size="12">Lettura live À sessioni À simulatore demo</text>
    <text x="56" y="278" fill="#8595b4" font-family="Segoe UI, sans-serif" font-size="11">Bridge verso adattatore seriale / veicolo</text>
  </g>

  <!-- arrows -->
  <path d="M248 260 H292" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="270" y="248" text-anchor="middle" fill="#8595b4" font-family="Segoe UI, sans-serif" font-size="10">serial</text>

  <path d="M820 176 H868" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="844" y="164" text-anchor="middle" fill="#8595b4" font-family="Segoe UI, sans-serif" font-size="10">HTTP</text>

  <path d="M868 220 H820" stroke="#7c5cff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="844" y="238" text-anchor="middle" fill="#8595b4" font-family="Segoe UI, sans-serif" font-size="10">WS live</text>

  <!-- internal stack arrows -->
  <path d="M520 100 V108" stroke="rgba(120,150,210,0.5)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M520 160 V168" stroke="rgba(120,150,210,0.5)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M520 220 V228" stroke="rgba(120,150,210,0.5)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- legend -->
  <g transform="translate(300, 438)">
    <rect width="520" height="56" rx="12" fill="rgba(18,24,41,0.6)" stroke="rgba(120,150,210,0.18)"/>
    <circle cx="32" cy="28" r="5" fill="#22d3ee"/>
    <text x="48" y="32" fill="#8595b4" font-family="Segoe UI, sans-serif" font-size="11">Dati veicolo in tempo reale</text>
    <circle cx="220" cy="28" r="5" fill="#3ddc97"/>
    <text x="236" y="32" fill="#8595b4" font-family="Segoe UI, sans-serif" font-size="11">Predizioni ML on-premise</text>
    <circle cx="400" cy="28" r="5" fill="#7c5cff"/>
    <text x="416" y="32" fill="#8595b4" font-family="Segoe UI, sans-serif" font-size="11">Tutto gira sul Pi  nessun cloud obbligatorio</text>
  </g>
</svg>
